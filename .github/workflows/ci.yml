name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DOCKER_HOST: unix:///var/run/docker.sock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Setup dev certs
        run: dotnet dev-certs https --trust
        env:
          WSL_INTEROP: ""

      - name: Verify Docker is available
        run: docker info

      - name: Restore NuGet Packages
        run: dotnet restore EmployeeManagement.sln

      - name: Run Build
        run: dotnet build EmployeeManagement.sln --no-restore

      - name: Run Integration Tests
        run: dotnet test EmployeeManagement.IntegrationTest/EmployeeManagement.IntegrationTest.csproj --no-build -v diag --logger "trx;LogFileName=integration-tests.trx" --results-directory ${{ runner.temp }}/TestResults

      - name: Publish Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ${{ runner.temp }}/TestResults/*.trx
